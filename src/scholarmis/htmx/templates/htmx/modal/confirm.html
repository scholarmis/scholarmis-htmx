<dialog id="htmx-confirm-modal" class="modal">
	<form method="dialog" class="modal-box">
		<h3 class="text-lg font-bold">Confirm Action</h3>
		<p id="htmx-confirm-modal-message" class="py-4">Are you sure?</p>
		<div class="modal-action">
			<button type="button" id="htmx-confirm-modal-cancel" class="btn">Cancel</button>
			<button type="button" id="htmx-confirm-modal-ok" class="btn btn-primary">OK</button>
		</div>
	</form>
</dialog>
