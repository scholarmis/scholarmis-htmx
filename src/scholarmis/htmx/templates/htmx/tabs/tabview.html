<div 

x-data="{
        activeTab: '{{ active_tab.name }}',
        setTab(tab) {
            this.activeTab = tab;
            localStorage.setItem('activeTab', tab);
        },
        loadTab(tab) {
            this.setTab(tab);
            // Wait for DOM to be ready, then trigger HTMX
            this.$nextTick(() => {
                const btn = $el.querySelector(`[data-tab='${tab}']`);
                if(btn) {
                    htmx.trigger(btn, 'click');
                }
            });
            
        }
    }"
x-init="loadTab(activeTab)">
    <nav class="bg-white shadow-sm flex overflow-x-auto no-scrollbar sticky top-0 z-10">
        {% for tab in tabs %}
        <button 
            type="button"
            data-tab="{{ tab.name }}"
            @click="setTab('{{ tab.name }}')"
            hx-get="?{{ tab_param }}={{ tab.name }}"
            hx-target="#tab-content"
            hx-trigger="click"
            hx-push-url="false"
            class="py-2 px-4 border-b-2 transition-all"
            :class="activeTab === '{{ tab.name }}' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'">
            <span class="font-medium text-sm">{{ tab.label }}</span>
        </button>
        {% endfor %}
    </nav>

    <div class="bg-white rounded-b-xl shadow-sm p-6">
        <div id="tab-content"></div>
    </div>
</div>
