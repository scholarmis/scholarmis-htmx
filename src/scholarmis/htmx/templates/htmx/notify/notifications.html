
<div 
    x-data="{ notificationOpen: false }"
    class="relative">
    
    <button @click="notificationOpen = !notificationOpen" 
            @click.outside="notificationOpen = false" 
            class="p-2 text-slate-500 hover:bg-slate-100 rounded-full relative">
        
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        
        <div id="htmx-notification-indicator" class="htmx-notification-indicator">
            {% if unread_count > 0 %}
                <span class="absolute -top-0.5 -right-0.5 flex items-center justify-center min-w-[1.25rem] h-5 px-1 bg-indigo-600 border-2 border-white text-white text-[10px] font-bold rounded-full">
                    {{ unread_count }}
                </span>
            {% endif %}
        </div>
    </button>

    <div x-show="notificationOpen" 
         x-transition
         class="absolute right-0 mt-2 w-80 bg-white border border-slate-200 rounded-xl shadow-xl z-50" 
         style="display: none;">
        
        <div class="p-4 border-b border-slate-100 font-bold text-sm flex justify-between items-center">
            Notifications 
            <span hx-post="{% url 'htmx:mark_all_as_read' %}" 
                  hx-target="#htmx-notification-list"
                  class="text-xs text-indigo-600 cursor-pointer hover:underline">
                Mark all read
            </span>
        </div>

        <div id="htmx-notification-list" 
            hx-get="{% url 'htmx:notification_list' %}" 
            hx-trigger="load" 
            class="htmx-notification-list max-h-64 overflow-y-auto">
        </div>
    </div>
</div>
