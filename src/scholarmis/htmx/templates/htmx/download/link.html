{% extends "htmx/download/base.html" %}

{% block htmx_download_content %}
<div class="fixed bottom-8 left-8 z-[9999] w-full max-w-md animate-slide-in-up">
    
    <div class="relative flex gap-4 p-5 bg-white border border-gray-200 rounded-2xl shadow-xl">

        <!-- Status Icon -->
        <div class="flex items-start">
            <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-emerald-100">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2l4 -4M12 3a9 9 0 100 18a9 9 0 000-18z" />
                </svg>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 pr-6">
            <h4 class="text-sm font-semibold text-gray-900">
                File Ready for Download
            </h4>
            <p class="mt-1 text-sm text-gray-600">
                Your requested document has been successfully generated and is ready for download.
                Click the button below to save it to your device.
            </p>

            <!-- Action Button -->
            <div class="mt-4">
                <a href="{{ file_url }}"
                   download
                   class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-emerald-600 rounded-xl hover:bg-emerald-500 transition-all duration-200 shadow-sm active:scale-95">
                    
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    
                    Download File
                </a>
            </div>
        </div>

        <!-- Close Button -->
        <button type="button"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 transition-colors"
                onclick="this.closest('.fixed').remove()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

    </div>
</div>
{% endblock  %}
