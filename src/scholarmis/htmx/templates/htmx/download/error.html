{% extends "htmx/download/base.html" %}

{% block htmx_download_content %}
<div class="fixed bottom-8 left-8 z-[9999] w-full max-w-md animate-slide-in-up">
    
    <div class="relative flex gap-4 p-5 bg-white border border-gray-200 rounded-2xl shadow-xl">

        <!-- Status Icon -->
        <div class="flex items-start">
            <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-emerald-100">
                <svg class="w-5 h-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 
                             1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 
                             00-1-1z"
                          clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 pr-6">
            <h4 class="text-sm font-semibold text-gray-900">
                Download Unsuccessful
            </h4>
            <p class="mt-1 text-sm text-gray-600">
                {{ error|default:"An unexpected error occurred while generating your file. Please try again." }}
            </p>
        </div>

        <!-- Close Button -->
        <button type="button"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 transition-colors"
                onclick="this.closest('.fixed').remove()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

    </div>
</div>
{% endblock  %}
